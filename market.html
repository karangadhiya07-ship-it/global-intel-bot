<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Watch | Global Intel Times</title>

<link rel="stylesheet" href="./style.css">

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#fff;
  color:#111;
}

.market-container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.market-header{
  text-align:center;
  border-bottom:2px solid #111;
  padding-bottom:20px;
  margin-bottom:30px;
}

.market-header h1{
  font-size:72px;
  margin:0;
}

.back-link{
  display:inline-block;
  margin-bottom:15px;
  color:#111;
}

.market-top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
  margin-bottom:30px;
}

.market-card{
  border:1px solid #ddd;
  padding:20px;
}

.market-card h2{
  margin-top:0;
}

.market-card p{
  line-height:1.7;
}

.chart-box{
  margin-top:30px;
  border:1px solid #ddd;
  padding:15px;
}

.related-news{
  margin-top:30px;
}

.related-news h2{
  border-bottom:2px solid #111;
  padding-bottom:10px;
}

.related-news a{
  display:block;
  margin:10px 0;
  text-decoration:none;
  color:#111;
}

.related-news a:hover{
  text-decoration:underline;
}

@media(max-width:900px){
  .market-top{
    grid-template-columns:1fr;
  }

  .market-header h1{
    font-size:48px;
  }
}
</style>
</head>

<body>

<div class="market-container">

<a href="./index.html" class="back-link">
← Back To Home
</a>

<div class="market-header">
<h1>Market Watch</h1>
</div>

<div class="market-top">

<div class="market-card">
<h2 id="assetTitle">Loading...</h2>
<h3 id="assetPrice"></h3>

<h2>Overview</h2>
<p id="assetOverview"></p>
</div>

<div class="market-card">
<h2>Market Signal</h2>
<p id="assetSignal"></p>

<h2>Latest Related News</h2>
<div id="assetNews"></div>
</div>

</div>

<div class="chart-box">

<h2>Live Chart</h2>

<div
class="tradingview-widget-container"
style="height:600px;width:100%;">

<div
id="tradingview_chart"
style="height:600px;width:100%;">
</div>

</div>

</div>

<div class="related-news">

<h2>More Market Coverage</h2>

<a href="./market.html?symbol=AAPL">Apple (AAPL)</a>
<a href="./market.html?symbol=MSFT">Microsoft (MSFT)</a>
<a href="./market.html?symbol=NVDA">Nvidia (NVDA)</a>
<a href="./market.html?symbol=AMZN">Amazon (AMZN)</a>
<a href="./market.html?symbol=META">Meta (META)</a>
<a href="./market.html?symbol=TSLA">Tesla (TSLA)</a>
<a href="./market.html?symbol=GOOGL">Google (GOOGL)</a>
<a href="./market.html?symbol=BTC">Bitcoin</a>

</div>

</div>

<script>

const marketData = {

AAPL:{
name:"Apple Inc.",
price:"+1.24% ↑",
overview:"Apple remains one of the world's largest technology companies.",
signal:"Positive trend."
},

MSFT:{
name:"Microsoft Corporation",
price:"+0.82% ↑",
overview:"Microsoft continues strong growth in cloud and AI.",
signal:"Bullish sentiment."
},

NVDA:{
name:"Nvidia Corporation",
price:"+2.31% ↑",
overview:"Nvidia dominates AI chip infrastructure.",
signal:"High momentum."
},

AMZN:{
name:"Amazon.com Inc.",
price:"-0.44% ↓",
overview:"Amazon remains a major e-commerce and cloud provider.",
signal:"Neutral."
},

META:{
name:"Meta Platforms",
price:"+1.09% ↑",
overview:"Meta benefits from digital advertising growth.",
signal:"Positive."
},

TSLA:{
name:"Tesla Inc.",
price:"-1.76% ↓",
overview:"Tesla investors track EV demand and autonomous driving.",
signal:"Volatile."
},

GOOGL:{
name:"Alphabet Inc.",
price:"+0.55% ↑",
overview:"Google continues expansion in AI and cloud.",
signal:"Positive."
},

BTC:{
name:"Bitcoin",
price:"+2.14% ↑",
overview:"Bitcoin remains the largest cryptocurrency.",
signal:"High volatility."
}

};

const chartMap = {
AAPL:"NASDAQ:AAPL",
MSFT:"NASDAQ:MSFT",
NVDA:"NASDAQ:NVDA",
AMZN:"NASDAQ:AMZN",
META:"NASDAQ:META",
TSLA:"NASDAQ:TSLA",
GOOGL:"NASDAQ:GOOGL",
BTC:"BINANCE:BTCUSDT"
};

const params = new URLSearchParams(window.location.search);

const symbol =
(params.get("symbol") || "AAPL").toUpperCase();

const asset =
marketData[symbol] || marketData.AAPL;

document.getElementById("assetTitle").textContent =
`${asset.name} (${symbol})`;

document.getElementById("assetPrice").textContent =
asset.price;

document.getElementById("assetOverview").textContent =
asset.overview;

document.getElementById("assetSignal").textContent =
asset.signal;

document.getElementById("assetNews").innerHTML =
`<a href="./index.html">View Latest Headlines →</a>`;

</script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

window.addEventListener("load", function(){

if(typeof TradingView !== "undefined"){

new TradingView.widget({

width:"100%",
height:600,

symbol:
chartMap[symbol] || "NASDAQ:AAPL",

interval:"D",

timezone:"America/New_York",

theme:"light",

style:"1",

locale:"en",

toolbar_bg:"#ffffff",

enable_publishing:false,

allow_symbol_change:true,

container_id:"tradingview_chart"

});

}

});

</script>

</body>
</html>
