<!DOCTYPE html>

<main class="market-page">

  },

const symbol = (params.get("symbol") || "AAPL").toUpperCase();
const asset = marketData[symbol] || marketData.AAPL;

document.title = `${asset.name} Market Watch | Global Intel Times`;

document.getElementById("assetTitle").textContent = `${asset.name} (${symbol})`;
document.getElementById("assetPrice").textContent = asset.price;
document.getElementById("assetOverview").textContent = asset.overview;
document.getElementById("assetSignal").textContent = asset.signal;

document.getElementById("assetNews").innerHTML = `
  <a href="./index.html">View latest related market headlines on Global Intel Times →</a>

</body>
