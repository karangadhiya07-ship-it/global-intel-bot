<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article | Global Intel Times</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="top-header">
  <div class="top-row">
    <div>
      <a href="./index.html">← Back to Home</a>
    </div>
    <h1>Global Intel Times</h1>
    <div></div>
  </div>
</header>

<main class="article-page">
  <article id="articleBox" class="article-detail">
    Loading article...
  </article>

  <section class="related-section">
    <h2>Related Stories</h2>
    <div id="relatedNews" class="below-grid"></div>
  </section>
</main>

<script>
function cleanText(text){
  if(!text || text === "undefined" || text === undefined){
    return "This story is developing. More updates may follow soon.";
  }

  return String(text)
    .replace("NEW", "")
    .replace("You can now listen to Fox News articles!", "")
    .replace(/\[\.\.\.\]/g, "")
    .replace(/The post .* appeared first on .*?\./gi, "")
    .trim();
}

function generateAISummary(article){

const title = article.title || "";
const desc = cleanText(
  article.description || article.content || article.summary || article.full_description || article.title
);

return `
<h2>AI Summary</h2>

<p>${desc}</p>

<h2>Background</h2>

<p>
This story has attracted attention because of its potential impact on people,
businesses, governments, investors, consumers, and global markets.
</p>

<h2>Key Takeaways</h2>

<ul>
<li>${title}</li>
<li>This remains a developing story.</li>
<li>Further updates are expected soon.</li>
</ul>

<h2>Why This Matters</h2>

<p>
The significance of this story extends beyond the immediate headlines.
</p>

<h2>What Happens Next</h2>

<p>
More announcements and official statements are expected.
</p>
`;
}
  
function generateAISummary(article){
  const title = article.title || "This story";
  const desc = cleanText(article.description);

  return `
    <h2>AI Summary</h2>
    <p>${desc}</p>

    <h2>Key Takeaways</h2>
    <ul>
      <li>${title}</li>
      <li>This story is currently developing.</li>
      <li>More updates may come from official and trusted sources.</li>
      <li>Readers should watch for new details in the coming hours.</li>
    </ul>
  `;
}

const params = new URLSearchParams(window.location.search);
const id = Number(params.get("id"));

const saved = JSON.parse(localStorage.getItem("articles") || "[]");
const article = saved[id];

const articleBox = document.getElementById("articleBox");
const relatedNews = document.getElementById("relatedNews");

if(article){

const cleanDesc = cleanText(
  article.description || article.content || article.summary || article.full_description || article.title
);
  document.title = article.title + " | Global Intel Times";

 articleBox.innerHTML = `

${article.image ? `<img src="${article.image}">` : ""}

<h1>${article.title}</h1>

<p>${cleanDesc}</p>

<hr>

${generateAISummary(article)}

<h2>Original Story</h2>

<p>${cleanDesc}</p>

<p class="source-credit">
Source: ${article.source || "News Source"}
</p>

<a
class="source-button"
href="${article.link}"
target="_blank">
Open Original Source
</a>

`;
  const related = saved
    .filter((item, index) => index !== id)
    .slice(0, 6);

  relatedNews.innerHTML = related.map((item) => `
    <article class="news-card">
      ${item.image ? `<img src="${item.image}" onerror="this.style.display='none'">` : ""}
      <span class="section-label">${item.section || "News"}</span>
      <h2>${item.title}</h2>
      <p>${cleanText(item.description)}</p>
      <a href="./article.html?id=${saved.indexOf(item)}">Read more ›</a>
    </article>
  `).join("");

}else{
  articleBox.innerHTML = `
    <h1>Article not found</h1>
    <p>Please go back to the homepage and open the article again.</p>
    <a href="./index.html">← Back to Home</a>
  `;
}
</script>

</body>
</html>
