<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Intel Times</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="top-header">
  <div class="top-row">
    <div>
      <span id="todayDate">Tuesday, June 23, 2026</span><br>
      <small>Global Intel Daily</small>
    </div>

    <h1>Global Intel Times</h1>

    <button class="subscribe-btn">Subscribe</button>
  </div>

  <nav class="nav-bar">
    <button class="topicBtn" data-topic="usa breaking news">U.S.</button>
    <button class="topicBtn" data-topic="world breaking news">World</button>
    <button class="topicBtn" data-topic="stock market finance news">Business</button>
    <button class="topicBtn" data-topic="artificial intelligence news">Technology</button>
    <button class="topicBtn" data-topic="bitcoin crypto news">Crypto</button>
    <button class="topicBtn" data-topic="sports news usa">Sports</button>
    <button class="topicBtn" data-topic="weather alert news">Weather</button>
  </nav>
</header>

<div class="live-strip" id="breakingTicker">LIVE • Loading latest updates...</div>

<section class="search-box">
  <select id="category">
    <option value="usa breaking news">U.S.</option>
    <option value="world breaking news">World</option>
    <option value="stock market finance news">Business</option>
    <option value="artificial intelligence news">Technology</option>
    <option value="bitcoin crypto news">Crypto</option>
  </select>

  <input id="searchBox" placeholder="Search news topic...">
  <button id="searchBtn">Search</button>
</section>

<main class="newspaper-layout">

  <section class="lead-grid">
    <article class="lead-card" id="leadLeft"></article>
    <article class="lead-card big" id="leadMain"></article>
    <article class="lead-card" id="leadRight"></article>
  </section>

  <section class="below-grid" id="newsFeed">
    <div class="loading">Loading live news...</div>
  </section>

</main>

<script src="./app.js"></script>
</body>
</html>
